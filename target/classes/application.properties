# ============================================
# myReqEng - Requirements Engineering Tool
# Spring Boot + PostgreSQL + Flyway configuration
# ============================================

spring.application.name=myreqeng

# === Database (PostgreSQL) ===
# Default expects a local Postgres (see docker-compose.yml or manual docker run)
spring.datasource.url=jdbc:postgresql://localhost:5433/reqengdb
spring.datasource.username=reqeng
spring.datasource.password=reqengsecret
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool (sensible defaults)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# === JPA ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# === Flyway (DB migrations) ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# === Logging (reduce noise for desktop app) ===
logging.level.org.springframework=INFO
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# For development you can override via application-local.properties or env vars:
# export SPRING_DATASOURCE_URL=...
# export SPRING_DATASOURCE_USERNAME=...
# export SPRING_DATASOURCE_PASSWORD=...